<header class="organismo-topbar">
  <div class="d-flex align-items-center gap-3">
    <button type="button" *ngIf="isLoggedIn" class="navbar-toggler border-0 p-2" style="background: rgba(255,255,255,0.08); border-radius: 10px; color: #fff;" (click)="toggleMenu.emit()" appTooltip="Abrir menú de navegación">
      <span class="navbar-toggler-icon"></span>
    </button>
    <a routerLink="/inicio" class="navbar-brand fw-bold" style="font-family: Georgia, 'Times New Roman', serif;" appTooltip="Ir a la página de inicio">Piedra Azul</a>
  </div>
  <div class="d-flex align-items-center gap-3">
    <ng-container *ngIf="isLoggedIn; else authLinks">
    <span class="organismo-user-badge" appTooltip="Perfil de usuario">{{ userInitials }}</span>
    </ng-container>
    <ng-template #authLinks>
      <a class="nav-link px-3 py-2 rounded-3 fw-semibold" style="color: #5cb85c; cursor: pointer;" (click)="login.emit()" appTooltip="Ingresar con su cuenta">Iniciar Sesión</a>
      <a class="nav-link px-3 py-2 rounded-3 fw-semibold" style="color: #b7c8d2; cursor: pointer;" (click)="register.emit()" appTooltip="Crear una cuenta nueva">Regístrate</a>
    </ng-template>
  </div>
</header>
