<div class="d-flex flex-column align-items-center justify-content-center gap-3 p-4">
  <div class="spinner-border" [class.spinner-border-sm]="size === 'sm'" [ngStyle]="size === 'lg' ? {'width': '3rem', 'height': '3rem', 'border-width': '0.25em'} : {}" style="--bs-spinner-color: #118a9b;" role="status">
    <span class="visually-hidden">Cargando...</span>
  </div>
  <span class="text-secondary small" *ngIf="text">{{ text }}</span>
</div>
