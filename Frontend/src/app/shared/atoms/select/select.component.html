<div class="mb-3">
  <label class="form-label" *ngIf="label" [for]="id">{{ label }}</label>
  <select
    [id]="id"
    [required]="required"
    [disabled]="disabled"
    [value]="value"
    (change)="handleSelectChange($event)"
    (blur)="onBlur()"
    class="form-select"
    [class.is-invalid]="hasError">
    <option value="" disabled *ngIf="placeholder">{{ placeholder }}</option>
    <option *ngFor="let opt of options" [value]="opt.value">{{ opt.label }}</option>
  </select>
  <div class="invalid-feedback" *ngIf="hasError && errorMessage">{{ errorMessage }}</div>
</div>
