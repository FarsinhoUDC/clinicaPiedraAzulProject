<div class="d-flex min-vh-100" style="background: #eaf0f5;">
  <organismo-sidebar
    *ngIf="showSidebar && isLoggedIn"
    [brandName]="brandName"
    [isAgendador]="isAgendador"
    [isPaciente]="isPaciente"
    [isAdmin]="isAdmin"
    [isMedico]="isMedico"
    [isLoggedIn]="isLoggedIn"
    [mobileOpen]="menuOpen"
    (menuClose)="onMenuClose.emit()"
    (logout)="onLogout.emit()">
  </organismo-sidebar>

  <div class="d-flex flex-column flex-grow-1 min-vh-100">
    <organismo-header
      [isLoggedIn]="isLoggedIn"
      [userLabel]="userLabel"
      [userInitials]="userInitials"
      (toggleMenu)="onToggleMenu.emit()"
      (logout)="onLogout.emit()"
      (login)="onLogin.emit()"
      (register)="onRegister.emit()">
    </organismo-header>

    <main class="flex-grow-1">
      <ng-content></ng-content>
    </main>
  </div>

  <div class="template-overlay" *ngIf="menuOpen && showSidebar && isLoggedIn" (click)="onMenuClose.emit()"></div>
</div>
