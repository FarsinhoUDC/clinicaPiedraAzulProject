<section class="consult-page">
  <div class="consult-card">
    <div class="consult-header">
      <h2>Consulta de Citas</h2>
      <p>Busque citas por medico y fecha</p>
    </div>

    <molecule-search-form
      [formGroup]="searchForm"
      [doctorOptions]="doctorOptions"
      [isLoading]="isLoading"
      (onSearch)="search()">
    </molecule-search-form>

    <molecule-metric-cards *ngIf="searchExecuted && !isLoading && appointments.length > 0"
      [cards]="metricCards">
    </molecule-metric-cards>

    <div class="loading-state" *ngIf="isLoading">Consultando citas del dia...</div>
    <div class="consult-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="consult-actions" *ngIf="appointments.length > 0">
      <atom-button variant="secondary" (onClick)="downloadCSV()" [disabled]="!canDownload">Descargar CSV</atom-button>
    </div>

    <organismo-appointment-table *ngIf="appointments.length > 0"
      [rows]="tableRows" [showAcciones]="false">
    </organismo-appointment-table>

    <div class="empty-state" *ngIf="searchExecuted && !isLoading && appointments.length === 0 && !errorMessage">
      No se encontraron citas para los criterios seleccionados.
    </div>
  </div>
</section>
