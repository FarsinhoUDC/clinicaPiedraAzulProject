<section class="patient-page">
  <div class="patient-card">
    <organismo-patient-form
      [formGroup]="form"
      title="Crea tu cuenta para agendar en linea"
      subtitle="Registro"
      [genderOptions]="genderSelectOptions"
      [showPasswordFields]="true"
      [showNote]="true"
      submitText="Crear cuenta"
      [errorMessage]="errorMessage"
      [successMessage]="message"
      (onSubmit)="submit()">
    </organismo-patient-form>
  </div>
</section>
