<section class="patient-page">
  <div class="patient-card">
    <div class="patient-register-panel">
      <div class="patient-register-intro">
        <div class="eyebrow">Registro</div>
        <strong>Crea tu cuenta para agendar en linea</strong>
       
      </div>

      <form [formGroup]="form" class="patient-form" (ngSubmit)="submit()">
        <div class="patient-grid">
          <div class="patient-field">
            <label>Numero de documento *</label>
            <atom-input formControlName="numeroDocumento" placeholder="C.C., T.I., etc."></atom-input>
          </div>
          <div class="patient-field">
            <label>Nombres *</label>
            <atom-input formControlName="nombres" placeholder="Tu nombre"></atom-input>
          </div>
          <div class="patient-field">
            <label>Apellidos *</label>
            <atom-input formControlName="apellidos" placeholder="Tu apellido"></atom-input>
          </div>
          <div class="patient-field">
            <label>Celular *</label>
            <atom-input formControlName="celular" placeholder="Número de celular"></atom-input>
          </div>
          <div class="patient-field">
            <label>Genero *</label>
            <atom-select formControlName="genero" [options]="genderSelectOptions" placeholder="Seleccione"></atom-select>
          </div>
          <div class="patient-field">
            <label>Correo electronico *</label>
            <atom-input type="email" formControlName="correo" placeholder="tu@correo.com"></atom-input>
          </div>
          <div class="patient-field">
            <label>Contrasena *</label>
            <atom-input type="password" formControlName="password" placeholder="Contraseña"></atom-input>
            <span class="patient-help">Fortaleza actual: {{ passwordStrengthLabel }}</span>
          </div>
          <div class="patient-field">
            <label>Confirmar contrasena *</label>
            <atom-input type="password" formControlName="passwordConfirmation" placeholder="Confirmar contraseña"></atom-input>
          </div>
        </div>

        <div class="patient-actions">
          <a class="patient-secondary" routerLink="/paciente/portal">Ir al portal</a>
          <atom-button type="submit" variant="primary" [block]="true">Crear cuenta</atom-button>
        </div>
      </form>

      <div class="patient-success" *ngIf="message">{{ message }}</div>
      <div class="patient-error" *ngIf="errorMessage">{{ errorMessage }}</div>
    </div>
  </div>
</section>
