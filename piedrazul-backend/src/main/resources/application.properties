server.port=8080

# H2 (desarrollo)
spring.datasource.url=jdbc:h2:mem:piedrazuldb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS para Angular
spring.web.cors.allowed-origins=http://localhost:4200

# ============================================================
# KEYCLOAK — Resource Server JWT
# El backend valida tokens emitidos por Keycloak.
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/Piedrazul-Realm

# JWK Set URI (opcional, se resuelve automaticamente desde issuer-uri)
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/Piedrazul-Realm/protocol/openid-connect/certs

# Propiedades para la administracion de Keycloak (Keycloak Admin Client)
keycloak.server-url=http://localhost:8180
keycloak.realm=Piedrazul-Realm
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.admin.client-id=admin-cli

# PostgreSQL (produccion) - descomentar cuando corresponda
# spring.datasource.url=jdbc:postgresql://localhost:5432/piedrazuldb
# spring.datasource.username=postgres
# spring.datasource.password=secret
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=validate

# ============================================================
# AUDITORÍA — Patrón con MDC (userId = sub del JWT de Keycloak)
# AuditAspect.java inyecta userId y username en el MDC.
# ============================================================
logging.pattern.console=%d{HH:mm:ss} [%X{userId:-anonymous}] %highlight(%-5level) %cyan(%logger{30}) - %msg%n

# Debug Spring Security (reducir a WARN en producción)
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.oauth2=WARN
logging.level.com.piedrazul=DEBUG
