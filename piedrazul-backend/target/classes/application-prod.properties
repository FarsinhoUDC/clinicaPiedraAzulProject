# ============================================================
# BASE DE DATOS — PostgreSQL en Railway
# Estas variables las define Railway automaticamente al
# conectar el servicio de PostgreSQL a tu backend.
# ============================================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# create-drop: borra y recrea tablas al iniciar (usar SOLO la primera vez)
# validate: solo valida que el esquema exista (para uso normal en prod)
spring.jpa.hibernate.ddl-auto=create

# ============================================================
# CORS — URL del frontend en Vercel
# Reemplaza con tu URL real de Vercel cuando la tengas
# ============================================================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

# ============================================================
# KEYCLOAK — URLs del servidor Keycloak en Railway
# Estas variables las configuras manualmente en Railway
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}

keycloak.server-url=${KEYCLOAK_SERVER_URL}
keycloak.admin.username=${KEYCLOAK_ADMIN_USER}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}

# ============================================================
# H2 Console — DESHABILITADA en produccion
# ============================================================
spring.h2.console.enabled=false