server.port=8080

# ============================================================
# JPA - Configuracion base
# ============================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================================
# KEYCLOAK — Propiedades comunes (realm y client no cambian)
# ============================================================
keycloak.realm=Piedrazul-Realm
keycloak.admin.client-id=admin-cli

# ============================================================
# AUDITORIA
# ============================================================
logging.pattern.console=%d{HH:mm:ss} [%X{userId:-anonymous}] %highlight(%-5level) %cyan(%logger{30}) - %msg%n
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.oauth2=WARN
logging.level.com.piedrazul=INFO