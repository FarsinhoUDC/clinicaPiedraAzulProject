# ============================================================
# BASE DE DATOS — H2 en memoria (solo desarrollo)
# ============================================================
spring.datasource.url=jdbc:h2:mem:piedrazuldb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# CORS — Solo el frontend local
# ============================================================
app.cors.allowed-origins=http://localhost:4200

# ============================================================
# KEYCLOAK — URLs locales
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/Piedrazul-Realm

keycloak.server-url=http://localhost:8180
keycloak.admin.username=admin
keycloak.admin.password=admin

# ============================================================
# LOGGING — Mas detalle en desarrollo
# ============================================================
logging.level.com.piedrazul=DEBUG